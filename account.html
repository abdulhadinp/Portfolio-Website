<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | Abdul Hadi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-QZTFRFX1GP"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-QZTFRFX1GP');
</script>
<body>
    <header class="header"></header>
    <main style="display:flex; justify-content:center; align-items:center;">
        <div class="container" style="max-width:600px; width:100%;">
            <div class="glass-card">
                <h1 class="section-title">My <span class="gradient-text">Profile</span></h1>
                
                <div id="account-details" style="margin-top:2rem;">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input id="acc-name" type="text">
                    </div>
                    <div class="form-group">
                        <label>Username</label>
                        <input id="acc-username" type="text">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input id="acc-email" type="email" readonly style="opacity:0.6; cursor:not-allowed;">
                    </div>
                    <div class="form-group">
                        <label>New Password (Optional)</label>
                        <div class="password-wrapper">
                            <input id="acc-password" type="password" placeholder="Leave blank to keep current">
                            <i class="fas fa-eye-slash toggle-password"></i>
                        </div>
                    </div>
                    <button id="updateBtn" class="btn btn-primary" style="width:100%;">Update Profile</button>
                </div>

                <div style="margin-top:3rem; padding-top:2rem; border-top:1px solid rgba(239, 68, 68, 0.3);">
                    <h3 style="color:#ef4444; margin-bottom:0.5rem;">Danger Zone</h3>
                    <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:1rem;">Deleting your account is permanent.</p>
                    <button id="deleteBtn" class="btn btn-danger" style="width:100%;">Delete Account</button>
                </div>
            </div>
        </div>
    </main>
    <footer class="footer"></footer>
    <script src="script.js"></script>
    <script src="account.js"></script>
</body>
</html>
