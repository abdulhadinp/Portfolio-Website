<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | Abdul Hadi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
</head>
<body>
    <header class="header"></header>
    <main style="display:flex; align-items:center; justify-content:center;">
        <div class="container" style="width:100%; max-width:450px;">
            <div class="glass-card">
                <h1 id="title" style="text-align:center; font-size:1.8rem;">Welcome</h1>
                <p style="text-align:center; color:var(--text-muted); margin-bottom:1.5rem;">Access your dashboard.</p>
                
                <div class="tabs" style="display:flex; background:rgba(0,0,0,0.3); border-radius:8px; padding:4px; margin-bottom:1.5rem;">
                    <div id="tabSignup" class="tab active" style="flex:1; text-align:center; padding:0.5rem; cursor:pointer; border-radius:6px; transition:0.3s;">Sign Up</div>
                    <div id="tabLogin" class="tab" style="flex:1; text-align:center; padding:0.5rem; cursor:pointer; border-radius:6px; transition:0.3s; color:var(--text-muted);">Login</div>
                </div>

                <div id="formArea">
                    <div id="nameField" class="form-group">
                        <label>Full Name</label>
                        <input id="name" type="text" placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Username</label>
                        <input id="username" type="text" placeholder="johndoe">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input id="email" type="email" placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <div class="password-wrapper">
                            <input id="password" type="password" placeholder="••••••••">
                            <i class="fas fa-eye-slash toggle-password"></i>
                        </div>
                    </div>
                    <button id="submitBtn" class="btn btn-primary" style="width:100%;">Create Account</button>
                </div>
            </div>
        </div>
    </main>
    <footer class="footer"></footer>
    <script src="script.js"></script>
    <script src="auth.js"></script>
</body>
</html>
